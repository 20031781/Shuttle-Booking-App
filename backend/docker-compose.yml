name: shuttlebooking

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shuttlebooking-db
    pull_policy: always
    restart: unless-stopped
    environment:
      - SA_PASSWORD=YourPassword123
      - ACCEPT_EULA=Y
    volumes:
      - dbdata:/var/opt/mssql
    ports:
      - "14330:1433"
    networks:
      - shuttlebooking-network

networks:
  shuttlebooking-network:
    driver: bridge

volumes:
  dbdata:
    driver: local