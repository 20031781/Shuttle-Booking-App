services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourPassword123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - shuttlebooking-net

  shuttlebooking.api:
    build:
      context: .  # Specifica il contesto di build, che è la cartella corrente
      dockerfile: ShuttleBooking.Presentation/Dockerfile  # Specifica il percorso del Dockerfile
    image: shuttlebookingapi:latest  # Nome personalizzato per l'immagine
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=ShuttleBookingDb;User Id=sa;Password=YourPassword123;TrustServerCertificate=True"
    ports:
      - "5000:8080"  # Mappa la porta 8080 del container a quella dell'host
      - "5001:8081"  # Mappa la porta 8081 del container a quella dell'host
    networks:
      - shuttlebooking-net
    depends_on:
      - db

networks:
  shuttlebooking-net:
    driver: bridge

volumes:
  dbdata: