name: CI-CD

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/ShuttleBookingApi.sln

      - name: Build
        run: dotnet build backend/ShuttleBookingApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/ShuttleBookingApi.sln --configuration Release --no-build

  mobile-quality:
    name: Mobile Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-quality]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish backend API
        run: dotnet publish backend/ShuttleBooking.Presentation/ShuttleBooking.Presentation.csproj -c Release -o artifacts/backend-api

      - name: Create mobile source artifact
        run: |
          mkdir -p artifacts
          git archive --format=tar.gz --output=artifacts/mobile-source.tar.gz HEAD mobile

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-api
          path: artifacts/backend-api

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-source
          path: artifacts/mobile-source.tar.gz

  deploy-ghcr:
    name: Deploy API Image (GHCR)
    runs-on: ubuntu-latest
    needs: [build-artifacts]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/api" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/ShuttleBooking.Presentation/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
